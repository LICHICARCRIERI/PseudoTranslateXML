<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PseudoTranslate</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #7c3aed;
      --accent2: #a78bfa;
      --success: #22c55e;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --danger: #f87171;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: white;
    }

    .logo h1 {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span {
      color: var(--accent2);
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      background: var(--accent);
      color: white;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem;
      gap: 1rem;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.55rem 1.25rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    .btn-success {
      background: transparent;
      color: var(--success);
      border: 1px solid var(--success);
    }
    .btn-success:hover { background: var(--success); color: #000; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--border);
    }
    .btn-danger:hover { border-color: var(--danger); }

    .toolbar-sep { flex: 1; }

    .status-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
    }

    /* PANELS */
    .panels {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .panel:focus-within {
      border-color: var(--accent);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .panel-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .panel-label .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
    }

    .panel-label .dot.green { background: var(--success); }

    .char-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--text);
      resize: none;
      min-height: 500px;
    }

    textarea::placeholder { color: var(--muted); }
    textarea[readonly] { color: var(--accent2); cursor: default; }

    /* COPY FEEDBACK */
    .copy-feedback {
      display: none;
      color: var(--success);
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      align-items: center;
      gap: 0.3rem;
    }
    .copy-feedback.show { display: flex; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: #1a1a22;
      border: 1px solid var(--success);
      color: var(--success);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 0.6rem 1.25rem;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 999;
      box-shadow: 0 4px 24px rgba(34,197,94,0.15);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* FOOTER */
    footer {
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .panels { grid-template-columns: 1fr; }
      main { padding: 1rem; }
      header { padding: 1rem; }
    }

    /* ANIMATION */
    @keyframes pulse-border {
      0%, 100% { border-color: var(--accent); }
      50% { border-color: var(--accent2); }
    }
    .panel.processing { animation: pulse-border 0.6s ease infinite; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">X/</div>
    <h1>Pseudo<span>Translate</span></h1>
  </div>
  <span class="badge">v1.1</span>
</header>

<main>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="convert()">
      ▶ Convert
    </button>
    <button class="btn btn-ghost" onclick="clearAll()">
      ✕ Clear
    </button>
    <div class="toolbar-sep"></div>
    <span class="status-pill" id="statusPill">Waiting for input…</span>
    <div class="copy-feedback" id="copyFeedback">✓ Copied!</div>
    <button class="btn btn-success" onclick="copyOutput()" id="copyBtn">
      ⎘ Copy output
    </button>
  </div>

  <div class="panels">
    <!-- INPUT -->
    <div class="panel" id="panelInput">
      <div class="panel-header">
        <div class="panel-label">
          <span class="dot"></span>
          Input — Original XML
        </div>
        <span class="char-count" id="inputCount">0 chars</span>
      </div>
      <textarea
        id="inputXml"
        placeholder='Paste your XML here...

Example:
  <String source="Expert">Expert</String>'
        oninput="onInputChange()"
        spellcheck="false"
      ></textarea>
    </div>

    <!-- OUTPUT -->
    <div class="panel" id="panelOutput">
      <div class="panel-header">
        <div class="panel-label">
          <span class="dot green"></span>
          Output — PseudoTranslated XML
        </div>
        <span class="char-count" id="outputCount">0 chars</span>
      </div>
      <textarea
        id="outputXml"
        readonly
        placeholder="Result appears here…"
        spellcheck="false"
      ></textarea>
    </div>
  </div>
</main>

<div id="toast">✓ Copied to clipboard</div>

<footer>
  <span class="footer-info">Replaces content between &gt;&lt; with x — spaces included</span>
  <span class="footer-info" id="stringsCount">—</span>
</footer>

<script>
  function onInputChange() {
    const input = document.getElementById('inputXml').value;
    document.getElementById('inputCount').textContent = input.length + ' chars';
    document.getElementById('statusPill').textContent = 'Ready to convert…';
  }

  function convert() {
    const input = document.getElementById('inputXml').value.trim();
    if (!input) {
      document.getElementById('statusPill').textContent = '⚠ Paste an XML first';
      return;
    }

    const panelOutput = document.getElementById('panelOutput');
    panelOutput.classList.add('processing');

    setTimeout(() => {
      const result = anonymizeXml(input);
      document.getElementById('outputXml').value = result;

      const outputLen = result.length;
      document.getElementById('outputCount').textContent = outputLen + ' chars';

      const matches = result.match(/<String /g);
      const count = matches ? matches.length : 0;
      document.getElementById('stringsCount').textContent = count + ' strings processed';
      document.getElementById('statusPill').textContent = '✓ Conversion successful';

      panelOutput.classList.remove('processing');
    }, 150);
  }

  function anonymizeXml(xml) {
    // Only replace content between > and </ (closing tag)
    // This avoids touching indentation/whitespace between sibling tags
    return xml.replace(/>([^<]+)<\//g, (match, content) => {
      const replaced = content.replace(/[^\n\r]/g, 'x');
      return '>' + replaced + '</';
    });
  }

  function copyOutput() {
    const output = document.getElementById('outputXml').value;
    if (!output) return;

    // Try modern clipboard API first, fallback to execCommand
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(output)
        .then(showToast)
        .catch(() => fallbackCopy(output));
    } else {
      fallbackCopy(output);
    }
  }

  function fallbackCopy(text) {
    const ta = document.getElementById('outputXml');
    ta.removeAttribute('readonly');
    ta.select();
    ta.setSelectionRange(0, 99999);
    try {
      document.execCommand('copy');
      showToast();
    } catch(e) {
      alert('Could not copy. Please select the text manually.');
    }
    ta.setAttribute('readonly', true);
    window.getSelection().removeAllRanges();
  }

  let toastTimer = null;
  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function clearAll() {
    document.getElementById('inputXml').value = '';
    document.getElementById('outputXml').value = '';
    document.getElementById('inputCount').textContent = '0 chars';
    document.getElementById('outputCount').textContent = '0 chars';
    document.getElementById('statusPill').textContent = 'Waiting for input…';
    document.getElementById('stringsCount').textContent = '—';
  }

  // Also convert on Ctrl+Enter
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') convert();
  });
</script>

</body>
</html>
